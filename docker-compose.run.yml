# Standalone run file — no host volume mounts (Docker Desktop file sharing not required)
# Usage: docker compose -f docker-compose.run.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: moharaznx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: moharaznx
      POSTGRES_PASSWORD: moharaznx
      POSTGRES_DB: moharaznx
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moharaznx -d moharaznx"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: moharaznx-api:latest
    container_name: moharaznx-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://moharaznx:moharaznx@postgres:5432/moharaznx
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      APP_ENV: development
      APP_DEBUG: "true"
    volumes:
      - api_uploads:/app/uploads
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: moharaznx-web:latest
    container_name: moharaznx-web
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: https://moharaznx-production.up.railway.app
    command: npm run dev -- --hostname 0.0.0.0 --port 3001
    depends_on:
      - api

volumes:
  pgdata:
  api_uploads:
