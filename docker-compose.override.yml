# Local override: removes host volume mounts (not shared with Docker Desktop)
# Code is already baked into the image via Dockerfile COPY
services:
  api:
    volumes:
      - api_uploads:/app/uploads

  web:
    volumes:
      - web_node_modules:/app/node_modules
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
